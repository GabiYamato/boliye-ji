service: "hindi_voice_service.py:HindiSchemeBot"
labels:
  owner: boliye-ji-team
  project: hindi-voice-agent
  language: hindi
description: "Hindi Voice Agent for Government Schemes and Scholarships"
include:
  - "*.py"
  - "README-HINDI-BOT.md"
python:
  requirements_txt: requirements-hindi-bot.txt
  lock_packages: false
docker:
  python_version: "3.11"
  system_packages:
    - ffmpeg
  setup_script: |
    apt-get update && apt-get install -y ffmpeg
envs:
  - name: OPENAI_SERVICE_URL
    description: "URL for the LLM service (OpenAI-compatible API)"
  - name: XTTS_SERVICE_URL
    description: "URL for the XTTS text-to-speech service"
  - name: OPENAI_API_KEY
    default: "n/a"
  - name: LLM_MODEL
    default: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  - name: BENTOCLOUD_DEPLOYMENT_URL
    description: "Deployment URL for Twilio webhook"
  - name: LD_LIBRARY_PATH
    value: "/app/.venv/lib/python3.11/site-packages/nvidia/cublas/lib:/app/.venv/lib/python3.11/site-packages/nvidia/cudnn/lib:/usr/local/lib/python3.11/site-packages/nvidia/cublas/lib:/usr/local/lib/python3.11/site-packages/nvidia/cudnn/lib"
